<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mix</title>
    <link rel="icon" href="/background.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            cursor: auto;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: url('/background.webp') center center fixed;
            background-size: cover;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 0;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .album-art {
            background: linear-gradient(135deg, #12631780 0%, #12631760 50%, #12631740 100%);
            box-shadow: 0 8px 32px #12631740;
            backdrop-filter: blur(10px);
        }
        
        .progress-bar {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #12631790, #126317b0);
        }
        
        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            height: 4px;
        }
        
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        
        .control-btn {
            transition: all 0.15s ease;
        }
        
        .control-btn:hover {
            color: white;
            transform: scale(1.1);
        }
        
        .control-btn:active {
            transform: scale(0.92);
        }
        
        .play-btn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0.2) 100%);
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }
        
        .play-btn:hover {
            transform: scale(1.05);
        }
        
        .play-btn:active {
            transform: scale(0.98);
        }
        
        .effects-panel {
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .eq-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 6px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
        }
        
        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        
        .playlist-item {
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        
        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .playlist-item.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        .playlist-item.active .song-title {
            color: white;
        }
        
        .playlist-item.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        
        .playlist-item.drag-over {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .toggle-btn {
            transition: all 0.2s ease;
        }
        
        .toggle-btn:hover {
            transform: scale(1.1);
        }
        
        .speed-btn {
            transition: all 0.15s ease;
        }
        
        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .speed-btn.active {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .spatial-btn {
            transition: all 0.15s ease;
        }
        
        .spatial-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .spatial-btn.active {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(10px);
        }
        
        .reset-btn {
            transition: all 0.15s ease;
        }
        
        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="w-full max-w-5xl">
        
        <!-- Main Player -->
        <div class="glass-card rounded-3xl p-6 md:p-8 mb-6 max-w-2xl mx-auto">
            <div class="flex flex-col items-center gap-4 md:gap-6">
                <!-- Album Art -->
                <div class="flex-shrink-0">
                    <div id="albumArt" class="album-art w-40 h-40 sm:w-48 sm:h-48 md:w-64 md:h-64 rounded-3xl flex items-center justify-center">
                        <svg class="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 text-white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                </div>
                
                <!-- Song Info & Controls -->
                <div class="flex-1 flex flex-col justify-center w-full">
                    <!-- Song Info -->
                    <div class="mb-4 md:mb-6 text-center">
                        <h2 id="songTitle" class="text-xl sm:text-2xl md:text-3xl font-semibold text-white">No song selected</h2>
                    </div>
                    
                    <!-- Progress Bar -->
                    <div class="mb-4 md:mb-6">
                        <div class="progress-bar rounded-full h-2 cursor-pointer" id="progressBar">
                            <div id="progressFill" class="progress-fill h-full rounded-full" style="width: 0%"></div>
                        </div>
                        <div class="flex justify-between text-xs text-white mt-2">
                            <span id="currentTime">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>
                    
                    <!-- Controls -->
                    <div class="flex items-center justify-center gap-4 md:gap-6 mb-4 md:mb-6">
                        <button id="prevBtn" class="control-btn" style="color: white">
                            <svg class="w-8 h-8 sm:w-9 sm:h-9 md:w-10 md:h-10" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                            </svg>
                        </button>
                        <button id="playPauseBtn" class="w-14 h-14 sm:w-16 sm:h-16 flex items-center justify-center" style="color: white">
                            <svg id="playIcon" class="w-6 h-6 sm:w-7 sm:h-7 md:w-8 md:h-8" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                            <svg id="pauseIcon" class="w-6 h-6 sm:w-7 sm:h-7 md:w-8 md:h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                            </svg>
                        </button>
                        <button id="nextBtn" class="control-btn" style="color: white">
                            <svg class="w-8 h-8 sm:w-9 sm:h-9 md:w-10 md:h-10" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Volume Control -->
                    <div class="flex items-center justify-center gap-3 md:gap-4">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" style="color: white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
                        </svg>
                        <input type="range" id="volumeSlider" class="volume-slider w-32 sm:w-40" min="0" max="100" value="80">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" style="color: white" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Effects Toggle Button -->
        <button id="effectsToggle" class="fixed bottom-4 right-4 md:bottom-6 md:right-6 w-12 h-12 md:w-14 md:h-14 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-md" style="color: white">
            <svg class="w-6 h-6 md:w-7 md:h-7" fill="currentColor" viewBox="0 0 24 24">
                <path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/>
            </svg>
        </button>
        
        <!-- Effects Panel -->
        <div id="effectsPanel" class="effects-panel fixed bottom-16 right-4 md:bottom-24 md:right-6 w-72 sm:w-80 md:w-96 max-h-[70vh] md:max-h-[80vh] overflow-y-auto rounded-2xl p-4 md:p-5 hidden scrollbar-thin backdrop-blur-xl bg-gray-900/90 border border-white/10">
            <h3 class="text-white font-semibold mb-5 text-lg">Audio Effects</h3>
            
            <!-- Speed Control -->
            <div class="mb-5">
                <label class="text-white text-sm mb-3 block">Speed (Slowed)</label>
                <div class="flex gap-2">
                    <button class="speed-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-speed="0.5">0.5x</button>
                    <button class="speed-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-speed="0.75">0.75x</button>
                    <button class="speed-btn px-4 py-2 rounded-lg active text-sm backdrop-blur-sm" data-speed="1">1x</button>
                    <button class="speed-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-speed="1.25">1.25x</button>
                    <button class="speed-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-speed="1.5">1.5x</button>
                </div>
            </div>
            
            <!-- Reverb -->
            <div class="mb-5">
                <label class="text-white text-sm mb-2 block">Reverb</label>
                <input type="range" id="reverbSlider" class="volume-slider w-full" min="0" max="100" value="0">
            </div>
            
            <!-- Bass -->
            <div class="mb-5">
                <label class="text-white text-sm mb-2 block">Bass</label>
                <input type="range" id="bassSlider" class="volume-slider w-full" min="0" max="100" value="50">
            </div>
            
            <!-- Treble -->
            <div class="mb-5">
                <label class="text-white text-sm mb-2 block">Treble</label>
                <input type="range" id="trebleSlider" class="volume-slider w-full" min="0" max="100" value="50">
            </div>
            
            <!-- Graphic Equalizer -->
            <div class="mb-5">
                <label class="text-white text-sm mb-3 block">Graphic Equalizer</label>
                <div class="flex justify-between gap-2 h-28">
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="60">
                        <span class="text-xs text-white mt-2">60Hz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="170">
                        <span class="text-xs text-white mt-2">170Hz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="310">
                        <span class="text-xs text-white mt-2">310Hz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="600">
                        <span class="text-xs text-white mt-2">600Hz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="1000">
                        <span class="text-xs text-white mt-2">1kHz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="3000">
                        <span class="text-xs text-white mt-2">3kHz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="6000">
                        <span class="text-xs text-white mt-2">6kHz</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <input type="range" class="eq-slider" orient="vertical" min="0" max="100" value="50" data-freq="12000">
                        <span class="text-xs text-white mt-2">12kHz</span>
                    </div>
                </div>
            </div>
            
            <!-- Dialog Clarity -->
            <div class="mb-5">
                <label class="text-white text-sm mb-2 block">Dialog Clarity</label>
                <input type="range" id="dialogSlider" class="volume-slider w-full" min="0" max="100" value="50">
            </div>
            
            <!-- Spatial Audio (8D/16D) -->
            <div class="mb-5">
                <label class="text-white text-sm mb-3 block">Spatial Audio</label>
                <div class="flex gap-2">
                    <button class="spatial-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-spatial="off">Off</button>
                    <button class="spatial-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-spatial="8d">8D</button>
                    <button class="spatial-btn px-4 py-2 rounded-lg bg-white/10 text-white text-sm backdrop-blur-sm" data-spatial="16d">16D</button>
                </div>
            </div>
            
            <!-- Reset to Default -->
            <div class="pt-4 border-t border-white/10">
                <button id="resetBtn" class="reset-btn w-full py-2 rounded-lg text-white text-sm border border-white/10 backdrop-blur-sm bg-white/5 hover:bg-white/10">Reset to Default</button>
            </div>
        </div>
    </div>
    
    <audio id="audioPlayer" crossorigin="anonymous"></audio>
    
    <script>
        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const songTitle = document.getElementById('songTitle');
        const effectsToggle = document.getElementById('effectsToggle');
        const effectsPanel = document.getElementById('effectsPanel');
        
        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;
        
        // Audio Context for effects
        let audioContext;
        let sourceNode;
        let gainNode;
        let bassFilter;
        let trebleFilter;
        let convolverNode;
        let eqFilters = [];
        
        function initAudioContext() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Don't create MediaElementSource to avoid CORS issues
                    // We'll use the audio element directly for playback
                    // and only use AudioContext for effects when needed
                    gainNode = audioContext.createGain();
                    
                    // Bass filter (low shelf)
                    bassFilter = audioContext.createBiquadFilter();
                    bassFilter.type = 'lowshelf';
                    bassFilter.frequency.value = 200;
                    
                    // Treble filter (high shelf)
                    trebleFilter = audioContext.createBiquadFilter();
                    trebleFilter.type = 'highshelf';
                    trebleFilter.frequency.value = 3000;
                    
                    // Create EQ filters
                    const eqFreqs = [60, 170, 310, 600, 1000, 3000, 6000, 12000];
                    eqFreqs.forEach(freq => {
                        const filter = audioContext.createBiquadFilter();
                        filter.type = 'peaking';
                        filter.frequency.value = freq;
                        filter.Q.value = 1;
                        filter.gain.value = 0;
                        eqFilters.push(filter);
                    });
                    
                    // Convolver for reverb
                    convolverNode = audioContext.createConvolver();
                    createReverbImpulse();
                    
                    // Note: We're not connecting sourceNode to avoid CORS issues
                    // Effects will be applied differently if needed
                } catch (error) {
                    console.error('Audio context initialization failed:', error);
                }
            }
        }
        
        function createReverbImpulse() {
            const sampleRate = audioContext.sampleRate;
            const length = sampleRate * 2;
            const impulse = audioContext.createBuffer(2, length, sampleRate);
            
            for (let channel = 0; channel < 2; channel++) {
                const channelData = impulse.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2);
                }
            }
            
            convolverNode.buffer = impulse;
        }
        
        // Load playlist from server with metadata
        async function loadPlaylist() {
            try {
                const response = await fetch('/playlist');
                const data = await response.json();
                
                playlist = data.filter(f => f.filename.endsWith('.mp3') || f.filename.endsWith('.mp4') || f.filename.endsWith('.wav') || f.filename.endsWith('.m4a'));
                
                if (playlist.length > 0) {
                    loadSong(0);
                }
            } catch (error) {
                console.error('Error loading playlist:', error);
            }
        }
        
        function formatSongName(filename) {
            // Remove numeric prefix (e.g., "001_", "002_", etc.)
            let name = filename.replace(/^\d+[._-]/, '');
            // Remove file extension
            name = name.replace(/\.[^/.]+$/, '');
            // Replace underscores and hyphens with spaces
            name = name.replace(/[-_]/g, ' ');
            return name;
        }
        
        function loadSong(index) {
            if (playlist.length === 0) return;
            
            // Reset state
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            
            // Initialize audio context before setting src
            initAudioContext();
            
            // Add cache-busting timestamp to prevent caching issues
            const timestamp = new Date().getTime();
            audioPlayer.src = `/playlist/${playlist[index].filename}?t=${timestamp}`;
            songTitle.textContent = playlist[index].title || formatSongName(playlist[index].filename);
            
            // Reset playback rate
            audioPlayer.playbackRate = 1;
            
            // Update Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: songTitle.textContent,
                    artwork: [
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '96x96', type: 'image/jpeg' },
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '128x128', type: 'image/jpeg' },
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '192x192', type: 'image/jpeg' },
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '256x256', type: 'image/jpeg' },
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '384x384', type: 'image/jpeg' },
                        { src: 'https://img.magnific.com/premium-photo/vast-calm-ocean-horizon-clear-light-blue-sky-water-blank-page-background_1277546-20317.jpg', sizes: '512x512', type: 'image/jpeg' },
                    ]
                });
            }
            
            // Load the audio
            audioPlayer.load();
        }
        
        function playSong() {
            // Resume audio context if suspended (required by modern browsers)
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            const playPromise = audioPlayer.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    playIcon.classList.add('hidden');
                    pauseIcon.classList.remove('hidden');
                    
                    // Update Media Session API
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.playbackState = 'playing';
                    }
                }).catch(error => {
                    console.error('Playback failed:', error);
                    isPlaying = false;
                    playIcon.classList.remove('hidden');
                    pauseIcon.classList.add('hidden');
                });
            }
        }
        
        function pauseSong() {
            audioPlayer.pause();
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            
            // Update Media Session API
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = 'paused';
            }
        }
        
        function prevSong() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) playSong();
        }
        
        function nextSong() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
            if (isPlaying) playSong();
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Event Listeners
        playPauseBtn.addEventListener('click', () => {
            if (isPlaying) {
                pauseSong();
            } else {
                playSong();
            }
        });
        
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        
        audioPlayer.addEventListener('timeupdate', () => {
            const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = `${progress}%`;
            currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
        });
        
        audioPlayer.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioPlayer.duration);
        });
        
        audioPlayer.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            console.error('Audio error code:', audioPlayer.error);
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            
            // Try to play next song if current fails
            if (audioPlayer.error) {
                setTimeout(() => {
                    nextSong();
                    if (isPlaying) playSong();
                }, 1000);
            }
        });
        
        audioPlayer.addEventListener('stalled', () => {
            console.warn('Audio stalled, attempting to recover');
        });
        
        audioPlayer.addEventListener('waiting', () => {
            console.log('Audio waiting for data');
        });
        
        audioPlayer.addEventListener('ended', () => {
            // Reset state before playing next
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            setTimeout(nextSong, 500);
        });
        
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioPlayer.currentTime = percent * audioPlayer.duration;
        });
        
        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value / 100;
            // Note: gainNode is not connected to avoid CORS issues
            // Volume is controlled directly via audio element
        });
        
        effectsToggle.addEventListener('click', () => {
            effectsPanel.classList.toggle('hidden');
        });
        
        // Speed controls
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                audioPlayer.playbackRate = parseFloat(btn.dataset.speed);
            });
        });
        
        // Reverb control
        document.getElementById('reverbSlider').addEventListener('input', (e) => {
            if (!audioContext) return;
            const value = e.target.value / 100;
            // Simple reverb simulation using gain
            if (value > 0) {
                // Would need proper reverb implementation
            }
        });
        
        // Bass control (disabled - requires audio context connection)
        document.getElementById('bassSlider').addEventListener('input', (e) => {
            // Bass effects disabled to avoid CORS issues
            console.log('Bass effects currently disabled');
        });
        
        // Treble control (disabled - requires audio context connection)
        document.getElementById('trebleSlider').addEventListener('input', (e) => {
            // Treble effects disabled to avoid CORS issues
            console.log('Treble effects currently disabled');
        });
        
        // EQ controls
        document.querySelectorAll('.eq-slider').forEach((slider, index) => {
            slider.addEventListener('input', (e) => {
                if (!eqFilters[index]) return;
                const value = (e.target.value - 50) / 50 * 12;
                eqFilters[index].gain.value = value;
            });
        });
        
        // Dialog clarity (disabled - requires audio context connection)
        document.getElementById('dialogSlider').addEventListener('input', (e) => {
            // Dialog clarity effects disabled to avoid CORS issues
            console.log('Dialog clarity effects currently disabled');
        });
        
        // Spatial audio controls (8D/16D)
        let spatialMode = 'off';
        let pannerNode = null;
        let spatialInterval = null;
        
        document.querySelectorAll('.spatial-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.spatial-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                spatialMode = btn.dataset.spatial;
                applySpatialAudio();
            });
        });
        
        function applySpatialAudio() {
            // Spatial audio disabled to avoid CORS issues
            if (spatialInterval) {
                clearInterval(spatialInterval);
                spatialInterval = null;
            }
            console.log('Spatial audio effects currently disabled');
        }
        
        // Reset to Default
        document.getElementById('resetBtn').addEventListener('click', () => {
            // Reset speed
            document.querySelectorAll('.speed-btn').forEach(b => {
                b.classList.remove('active');
            });
            document.querySelector('.speed-btn[data-speed="1"]').classList.add('active');
            audioPlayer.playbackRate = 1;
            
            // Reset sliders
            document.getElementById('reverbSlider').value = 0;
            document.getElementById('bassSlider').value = 50;
            document.getElementById('trebleSlider').value = 50;
            document.getElementById('dialogSlider').value = 50;
            
            // Reset EQ
            document.querySelectorAll('.eq-slider').forEach(slider => {
                slider.value = 50;
            });
            
            // Reset spatial audio
            document.querySelectorAll('.spatial-btn').forEach(b => {
                b.classList.remove('active');
            });
            document.querySelector('.spatial-btn[data-spatial="off"]').classList.add('active');
            spatialMode = 'off';
            if (spatialInterval) {
                clearInterval(spatialInterval);
                spatialInterval = null;
            }
            if (pannerNode) {
                pannerNode.pan.value = 0;
            }
            
            // Reset audio filters
            if (bassFilter) bassFilter.gain.value = 0;
            if (trebleFilter) trebleFilter.gain.value = 0;
            if (eqFilters) {
                eqFilters.forEach(filter => {
                    filter.gain.value = 0;
                });
            }
        });
        
        // Initialize
        loadPlaylist();
        audioPlayer.volume = 0.8;
        
        // Setup Media Session API for background playback
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => {
                playSong();
            });
            
            navigator.mediaSession.setActionHandler('pause', () => {
                pauseSong();
            });
            
            navigator.mediaSession.setActionHandler('previoustrack', () => {
                prevSong();
            });
            
            navigator.mediaSession.setActionHandler('nexttrack', () => {
                nextSong();
            });
            
            navigator.mediaSession.setActionHandler('seekto', (details) => {
                if (details.seekTime && !isNaN(details.seekTime)) {
                    audioPlayer.currentTime = details.seekTime;
                }
            });
        }
    </script>
</body>
</html>
